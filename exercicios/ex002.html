<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        :root {
            --primary-color: #23013a;
            --secondary-color: #9446ec;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Já me livrei da maldição!</p>

    <script>
       var name = window.prompt("Qual é o seu nome?");
       window.alert("Olá, " + name + "!");// Concatenando a string "Olá, " com o valor da variável name e o ponto de exclamação "!" para criar a mensagem personalizada.
    </script>
</body>
</html>
