<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrevendo meu primeiro código em JavaScript</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #23013a;
            color: white;
        }
    </style>
</head>
<body>
    <script>var nome = window.prompt("Qual é o seu nome?");
        document.write(`Olá, <strong> ${nome}! </strong> Seu nome tem ${nome.length} letras!`);
        document.write(`Seu nome em maiúsculas é ${nome.toUpperCase()}!<br/>`);
        document.write(`Seu nome em minúsculas é ${nome.toLowerCase()}!`);
    </script>
</body>
</html>
