<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multa automatica</title>
    <style>
        body {
            font: 900 50px Arial, Helvetica, sans-serif; 
            color: white;
            text-align: center;
            background-color: black;

        }
        input {
            font: 900 30px Arial, Helvetica, sans-serif; 
            color: white;
            background-color: black;
            border: 2px solid white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Multa automatica</h1>
    Velocidade do carro:<input type="number" name="txtvel" id="txtvel"> Km/h
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res">

    </div>
    <script>
        function calcular() {
        var txtv = document.querySelector('input#txtvel')
        var res = document.querySelector('div#res')
        var vel = Number(txtv.value)
        res.innerHTML = `<p>Sua velocidade é de ${vel} Km/h</p>`
        if (vel > 60) {
        res.innerHTML += `<p>'Você ultrapassou a velocidade permitida. Estará sujeito a uma multa.'</p>`
        }
    }
    </script>
</body>
</html>
